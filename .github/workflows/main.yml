name: scan-market

on:
  workflow_dispatch: # Mengaktifkan tombol "Run workflow" manual di dashboard GitHub
  schedule:
    - cron: '0 9 * * 1-5' # Berjalan otomatis Senin - Jumat jam 16:00 WIB (09:00 UTC)

jobs:
  scan-market:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        uses: actions/checkout@v4

      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Pustaka Analisis Saham
        run: |
          pip install requests yfinance pandas numpy

      - name: Jalankan ABO Scanner Massal
        run: python main.py
