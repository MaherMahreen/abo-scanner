name: Sinyal Saham Sideways Harian

on:
  schedule:
    # Berjalan otomatis Senin - Jumat jam 16:30 WIB (09:30 UTC)
    - cron: '30 9 * * 1-5'
  workflow_dispatch: # Mengizinkan tombol manual "Run workflow"

jobs:
  scan-market:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode Repositori
      uses: actions/checkout@v4

    - name: Atur Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instal Dependensi
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Jalankan Scanner Utama
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python main.py
