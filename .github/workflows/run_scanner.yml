name: ABO Scanner Test

on:
  workflow_dispatch:

jobs:
  scan-market:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y numpy pandas
          pip install numpy==1.26.4 pandas==2.0.3 yfinance requests

      - name: Jalankan ABO Scanner
        run: |
          python jalan_radar.py
