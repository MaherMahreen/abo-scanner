name: Sinyal Saham Sideways Harian

on:
  schedule:
    # Berjalan setiap hari Senin-Jumat jam 16:30 WIB (09:30 UTC) setelah pasar BEI tutup
    - cron: '30 9 * * 1-5'
  workflow_dispatch: # Memperbolehkan Anda menjalankan skrip secara manual kapan saja

jobs:
  scan-market:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode Repositori
      uses: actions/checkout@v4

    - name: Atur Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instal Pustaka Dependensi
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: Jalankan Skrip Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python scanner.py
