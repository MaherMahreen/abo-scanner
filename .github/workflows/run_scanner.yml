name: Sinyal Saham Sideways Harian

on:
  schedule:
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

jobs:
  scan-market:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install and Fix Dependencies
      run: |
        python -m pip install --upgrade pip
        # Memaksa instalasi ulang numpy dan pandas yang bersih agar terbebas dari error sisa lokal
        pip install --force-reinstall --no-cache-dir numpy pandas yfinance requests

    - name: Run Main Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python jalan_radar.py
