name: Tes Koneksi Telegram

on:
  workflow_dispatch:

jobs:
  tes-telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Kirim Pesan Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python << EOF
          import os
          import requests

          TOKEN = os.getenv("TELEGRAM_TOKEN")
          CHAT_ID = os.getenv("CHAT_ID")

          print("TOKEN ditemukan:", TOKEN is not None)
          print("CHAT_ID ditemukan:", CHAT_ID is not None)

          if not TOKEN or not CHAT_ID:
              raise Exception("TELEGRAM_TOKEN atau CHAT_ID belum dibuat di GitHub Secrets")

          url = f"https://api.telegram.org/bot{TOKEN}/sendMessage"

          payload = {
              "chat_id": CHAT_ID,
              "text": "✅ TEST BERHASIL!\nGitHub Actions berhasil mengirim pesan ke Telegram."
          }

          response = requests.post(url, json=payload)

          print("Status Code:", response.status_code)
          print("Response:", response.text)
          EOF
