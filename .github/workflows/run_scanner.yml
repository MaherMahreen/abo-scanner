name: Sinyal Saham Sideways Harian

on:
  schedule:
    # Berjalan otomatis Senin - Jumat jam 16:30 WIB (09:30 UTC) setelah bursa BEI tutup
    - cron: '30 9 * * 1-5'
  workflow_dispatch: # Mengaktifkan tombol manual "Run workflow"

jobs:
  scan-market:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Requests Library
      run: pip install requests

    - name: Jalankan ABO Scanner Massal
      run: |
        # FIXED: Diarahkan langsung ke main.py agar seluruh modul Score & Signal Engine aktif nyata!
        python main.py
